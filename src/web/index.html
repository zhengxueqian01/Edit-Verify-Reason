    function renderWorkflowPlayback(options = {}) {
      if (!workflowPlayback || !workflowPlayback.model) {
        renderWorkflowEmptyState();
        return;
      }

      workflowPanel.innerHTML = `
        <div class="workflow-playback">
          ${renderWorkflowToolbar(workflowPlayback.model, workflowPlayback)}
          ${renderWorkflowStageCards(workflowPlayback)}
        </div>
      `;

      if (options.scrollToActive) {
        window.requestAnimationFrame(() => {
          if (!workflowPlayback) return;
          const currentSection = workflowPanel.querySelector(`[data-workflow-section-index="${workflowPlayback.activeIndex}"]`);
          if (currentSection) {
            currentSection.scrollIntoView({
              block: 'nearest',
              behavior: workflowPlayback.autoPlay ? 'smooth' : 'auto',
            });
          }
        });
      }
    }

    function scheduleWorkflowPlaybackAdvance() {
      clearWorkflowPlaybackTimer();
      if (!workflowPlayback || !workflowPlayback.autoPlay || workflowPlayback.expandAll) return;
      const total = Array.isArray(workflowPlayback.sections) ? workflowPlayback.sections.length : 0;
      if (!total || workflowPlayback.activeIndex >= total - 1) {
        workflowPlayback.autoPlay = false;
        renderWorkflowPlayback();
        return;
      }
      workflowPlayback.timer = window.setTimeout(() => {
        if (!workflowPlayback) return;
        const totalSteps = Array.isArray(workflowPlayback.sections) ? workflowPlayback.sections.length : 0;
        const nextIndex = Math.min(totalSteps - 1, workflowPlayback.activeIndex + 1);
        const reachedEnd = nextIndex >= totalSteps - 1;
        workflowPlayback.activeIndex = nextIndex;
        workflowPlayback.revealCount = nextIndex + 1;
        workflowPlayback.autoPlay = !reachedEnd;
        renderWorkflowPlayback({ scrollToActive: true });
        if (!reachedEnd) {
          scheduleWorkflowPlaybackAdvance();
        }
      }, WORKFLOW_AUTO_PLAY_MS);
    }

    function setWorkflowPlaybackStep(nextIndex, options = {}) {
      if (!workflowPlayback || !Array.isArray(workflowPlayback.sections) || !workflowPlayback.sections.length) return;
      const total = workflowPlayback.sections.length;
      const clampedIndex = Math.max(0, Math.min(total - 1, nextIndex));
      clearWorkflowPlaybackTimer();
      workflowPlayback.activeIndex = clampedIndex;
      workflowPlayback.expandAll = Boolean(options.expandAll);
      workflowPlayback.autoPlay = Boolean(options.autoPlay) && !workflowPlayback.expandAll;
      workflowPlayback.revealCount = workflowPlayback.expandAll ? total : (clampedIndex + 1);
      renderWorkflowPlayback({ scrollToActive: true });
      if (workflowPlayback.autoPlay) {
        scheduleWorkflowPlaybackAdvance();
      }
    }

    function renderWorkflow(data, context = {}) {
      const model = buildWorkflowModel(data, context);
      const sections = buildWorkflowSections(model);
      workflowPlayback = {
        model,
        sections,
        activeIndex: sections.length ? 0 : -1,
        revealCount: sections.length ? 1 : 0,
        autoPlay: sections.length > 1,
        expandAll: false,
        timer: 0,
      };
      renderWorkflowPlayback();
      if (workflowPlayback.autoPlay) {
        scheduleWorkflowPlaybackAdvance();
      }
    }

    function renderWorkflowSnapshot(data, context = {}) {
      const model = buildWorkflowModel(data, context);
      const sections = buildWorkflowSections(model);
      workflowPlayback = {
        model,
        sections,
        activeIndex: sections.length ? sections.length - 1 : -1,
        revealCount: sections.length,
        autoPlay: false,
        expandAll: true,
        timer: 0,
      };
      renderWorkflowPlayback();
    }

    function updateStreamingStatus(eventName) {
      const statusMap = {
        started: '请求已发送，开始执行 workflow...',
        question_split_done: '问题拆解完成',
        plan_done: '规划步骤完成',
        step_started: '正在执行当前 step...',
        step_finished: '当前 step 已完成',
        render_check_done: '渲染校验已更新',
        answer_done: '答案已生成，准备工具增强',
        tool_phase_done: '工具阶段已完成',
        completed: 'Analysis complete',
      };
      const text = statusMap[eventName] || 'Processing instruction...';
      const tone = eventName === 'completed' ? 'success' : 'active';
      setStatus(text, tone);
    }

    function applyWorkflowSnapshot(eventPayload, context = {}) {
      const snapshot = eventPayload && typeof eventPayload.snapshot === 'object' ? eventPayload.snapshot : null;
      if (!snapshot) return;
      renderWorkflowSnapshot(snapshot, context);
    }

    async function consumeWorkflowStream(response, context = {}) {
      if (!response.body) {
        throw new Error('Streaming response body is unavailable.');
      }
      const reader = response.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      let finalSnapshot = null;
      let finalError = null;

      function processEventBlock(block) {
        const lines = block.split('\n');
        let eventName = 'message';
        const dataLines = [];
        lines.forEach((line) => {
          if (line.startsWith('event:')) {
            eventName = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            dataLines.push(line.slice(5).trim());
          }
        });
        if (!dataLines.length) return;
        let payload = {};
        try {
          payload = JSON.parse(dataLines.join('\n'));
        } catch (err) {
          console.error('Failed to parse workflow stream payload', err);
          return;
        }
        if (eventName === 'error') {
          finalError = payload;
          return;
        }
        updateStreamingStatus(eventName);
        applyWorkflowSnapshot(payload, context);
        if (eventName === 'completed') {
          finalSnapshot = payload.snapshot || null;
        }
      }

      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
        let boundaryIndex = buffer.indexOf('\n\n');
        while (boundaryIndex >= 0) {
          const block = buffer.slice(0, boundaryIndex).trim();
          buffer = buffer.slice(boundaryIndex + 2);
          if (block) {
            processEventBlock(block);
          }
          boundaryIndex = buffer.indexOf('\n\n');
        }
        if (done) {
          if (buffer.trim()) {
            processEventBlock(buffer.trim());
          }
          break;
        }
      }

      if (finalError) {
        const message = _text(finalError.error) || 'Unknown streaming error';
        throw new Error(message);
      }
      if (!finalSnapshot) {
        throw new Error('Workflow stream ended without a completed snapshot.');
      }
      return finalSnapshot;
    }

    function renderAllAnswersAsChat(data) {
      const result = data && typeof data.result === 'object' ? data.result : {};
      const sections = [
        { title: 'Original QA', payload: result.answer_original, tone: 'info' },
        { title: 'Updated QA', payload: result.answer_initial || result.answer, tone: 'success' },
        { title: 'Tool-Augmented QA', payload: result.answer_tool_augmented, tone: 'success' },
      ].filter((item) => hasValue(item.payload) || _answerText(item.payload));

      const timeStr = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const modelNameBadge = data.model_name
        ? ` <span style="font-size:10px; background:#e2e8f0; color:#475569; padding:2px 6px; border-radius:10px; margin-left:8px;">🤖 ${escapeHtml(data.model_name)}</span>`
        : '';

      if (!sections.length) {
        return `
          <div class="chat-message">
            <div class="chat-time">${timeStr}</div>
            <div class="chat-bubble" style="border-left-color:#e53e3e;">
              <h4>Execution Failed</h4>
              <p>${escapeHtml(_text(data && data.qa_answer) || _text(data && data.error) || 'No response returned from the workflow.')}</p>
            </div>
          </div>
        `;
      }

      return sections.map((section, index) => {
        const payload = section.payload && typeof section.payload === 'object' ? section.payload : {};
        const answerText = _answerText(section.payload);
        const issues = Array.isArray(payload.issues) ? payload.issues : [];
        const llmRaw = _text(payload.llm_raw);
        const bubbleStyle = section.tone === 'success'
          ? 'style="border-left-color:var(--accent-green);"'
          : 'style="border-left-color:var(--primary);"';

        return `
          <div class="chat-message">
            <div class="chat-time">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              ${timeStr} - ${escapeHtml(section.title)}${index === 1 ? modelNameBadge : ''}
            </div>
            <div class="chat-bubble" ${bubbleStyle}>
              <h4>${escapeHtml(section.title)}</h4>
              <p>${escapeHtml(answerText || '(No answer text provided)')}</p>
              ${renderReasonList(payload.reason)}
              ${issues.length ? `<div class="issues">Issues: ${escapeHtml(issues.join(', '))}</div>` : ''}
              ${llmRaw ? `<div class="raw">${escapeHtml(llmRaw)}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    workflowPanel.addEventListener('click', (event) => {
      const control = event.target.closest('[data-workflow-action]');
      if (!control || !workflowPlayback) return;

      const action = control.getAttribute('data-workflow-action');
      const total = Array.isArray(workflowPlayback.sections) ? workflowPlayback.sections.length : 0;
      if (!total) return;

      if (action === 'prev') {
        setWorkflowPlaybackStep(workflowPlayback.activeIndex - 1, { autoPlay: false, expandAll: false });
        return;
      }

      if (action === 'next') {
        setWorkflowPlaybackStep(workflowPlayback.activeIndex + 1, { autoPlay: false, expandAll: false });
        return;
      }

      if (action === 'restart') {
        setWorkflowPlaybackStep(0, { autoPlay: true, expandAll: false });
        return;
      }

      if (action === 'toggle-play') {
        if (workflowPlayback.autoPlay) {
          clearWorkflowPlaybackTimer();
          workflowPlayback.autoPlay = false;
          renderWorkflowPlayback();
          return;
        }
        const restartFromHead = workflowPlayback.activeIndex >= total - 1;
        setWorkflowPlaybackStep(restartFromHead ? 0 : workflowPlayback.activeIndex, { autoPlay: true, expandAll: false });
        return;
      }

      if (action === 'toggle-expand') {
        if (workflowPlayback.expandAll) {
          setWorkflowPlaybackStep(workflowPlayback.activeIndex, { autoPlay: false, expandAll: false });
          return;
        }
        setWorkflowPlaybackStep(workflowPlayback.activeIndex, { autoPlay: false, expandAll: true });
        return;
      }

      if (action === 'jump') {
        const targetIndex = Number(control.getAttribute('data-workflow-index'));
        if (Number.isFinite(targetIndex)) {
          setWorkflowPlaybackStep(targetIndex, { autoPlay: false, expandAll: false });
        }
      }
    });

    function setStatus(text, stateClass) {
      statusText.textContent = text;
      const indicator = statusBox.querySelector('.indicator');
      if (stateClass === 'active') {
        indicator.style.background = 'var(--primary)';
        indicator.style.boxShadow = '0 0 0 2px rgba(82, 137, 219, 0.2)';
      } else if (stateClass === 'success') {
        indicator.style.background = 'var(--accent-green)';
        indicator.style.boxShadow = '0 0 0 2px rgba(72, 166, 95, 0.2)';
      } else if (stateClass === 'error') {
        indicator.style.background = '#e53e3e';
        indicator.style.boxShadow = '0 0 0 2px rgba(229, 62, 62, 0.2)';
      } else {
        indicator.style.background = '#dcdfe6';
        indicator.style.boxShadow = 'none';
      }
    }

    function setAnnoMode(mode, activeBtn) {
      annoMode = mode;
      modeBtns.forEach((button) => button.classList.remove('active'));
      activeBtn.classList.add('active');
    }

    function drawAnnotations() {
      annoCtx.clearRect(0, 0, annoCanvas.width, annoCanvas.height);
      annoCtx.strokeStyle = '#ef4444';
      annoCtx.fillStyle = '#ef4444';
      annoCtx.lineWidth = Math.max(2, annoCanvas.width / 300);

      annotations.forEach((item) => {
        if (item.type === 'point') {
          annoCtx.beginPath();
          annoCtx.arc(item.x, item.y, Math.max(4, annoCanvas.width / 150), 0, Math.PI * 2);
          annoCtx.fill();
        } else if (item.type === 'line') {
          annoCtx.beginPath();
          annoCtx.moveTo(item.x1, item.y1);
          annoCtx.lineTo(item.x2, item.y2);
          annoCtx.stroke();
        } else if (item.type === 'box') {
          annoCtx.strokeRect(item.x, item.y, item.w, item.h);
          annoCtx.fillStyle = 'rgba(239, 68, 68, 0.15)';
          annoCtx.fillRect(item.x, item.y, item.w, item.h);
          annoCtx.fillStyle = '#ef4444';
        }
      });
    }

    function getMousePos(evt) {
      const rect = annoCanvas.getBoundingClientRect();
      const scaleX = annoCanvas.width / rect.width;
      const scaleY = annoCanvas.height / rect.height;
      return {
        x: (evt.clientX - rect.left) * scaleX,
        y: (evt.clientY - rect.top) * scaleY,
      };
    }

    function syncAnnotationCanvasToResult() {
      if (!resultImage.src || resultImage.style.display === 'none') return;
      annoCanvas.width = resultImage.naturalWidth || 800;
      annoCanvas.height = resultImage.naturalHeight || 600;
      annoCanvas.style.pointerEvents = 'auto';
      const rect = resultImage.getBoundingClientRect();
      annoCanvas.style.width = `${rect.width}px`;
      annoCanvas.style.height = `${rect.height}px`;
      drawAnnotations();
    }

    async function renderEnhancedBlob() {
      if (!window.currentResultUrl || !resultImage.src) return null;
      const exportCanvas = document.createElement('canvas');
      exportCanvas.width = resultImage.naturalWidth || resultImage.width || 1;
      exportCanvas.height = resultImage.naturalHeight || resultImage.height || 1;
      const ctx = exportCanvas.getContext('2d');
      ctx.drawImage(resultImage, 0, 0, exportCanvas.width, exportCanvas.height);
      ctx.drawImage(annoCanvas, 0, 0, exportCanvas.width, exportCanvas.height);
      return new Promise((resolve) => exportCanvas.toBlob(resolve, 'image/png'));
    }

    btnModePoint.addEventListener('click', () => setAnnoMode('point', btnModePoint));
    btnModeLine.addEventListener('click', () => setAnnoMode('line', btnModeLine));
    btnModeBox.addEventListener('click', () => setAnnoMode('box', btnModeBox));

    annoCanvas.addEventListener('mousedown', (event) => {
      isDrawing = true;
      const pos = getMousePos(event);
      startX = pos.x;
      startY = pos.y;
      if (annoMode === 'point') {
        annotations.push({ type: 'point', x: startX, y: startY });
        drawAnnotations();
        isDrawing = false;
      }
    });

    annoCanvas.addEventListener('mousemove', (event) => {
      if (!isDrawing) return;
      const pos = getMousePos(event);
      drawAnnotations();
      annoCtx.strokeStyle = '#ef4444';
      annoCtx.lineWidth = Math.max(2, annoCanvas.width / 300);
      if (annoMode === 'line') {
        annoCtx.beginPath();
        annoCtx.moveTo(startX, startY);
        annoCtx.lineTo(pos.x, pos.y);
        annoCtx.stroke();
      } else if (annoMode === 'box') {
        annoCtx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
        annoCtx.fillStyle = 'rgba(239, 68, 68, 0.15)';
        annoCtx.fillRect(startX, startY, pos.x - startX, pos.y - startY);
        annoCtx.fillStyle = '#ef4444';
      }
    });

    annoCanvas.addEventListener('mouseup', (event) => {
      if (!isDrawing) return;
      isDrawing = false;
      const pos = getMousePos(event);
      if (annoMode === 'line') {
        if (Math.abs(pos.x - startX) > 2 || Math.abs(pos.y - startY) > 2) {
          annotations.push({ type: 'line', x1: startX, y1: startY, x2: pos.x, y2: pos.y });
        }
      } else if (annoMode === 'box') {
        if (Math.abs(pos.x - startX) > 2 && Math.abs(pos.y - startY) > 2) {
          annotations.push({ type: 'box', x: startX, y: startY, w: pos.x - startX, h: pos.y - startY });
        }
      }
      drawAnnotations();
    });

    annoCanvas.addEventListener('mouseleave', () => {
      if (isDrawing) {
        isDrawing = false;
        drawAnnotations();
      }
    });

    btnUndoAnno.addEventListener('click', () => {
      annotations.pop();
      drawAnnotations();
    });

    btnClearAnno.addEventListener('click', () => {
      annotations = [];
      drawAnnotations();
    });

    svgFileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      const isSvg = !!file && (file.type === 'image/svg+xml' || _text(file.name).toLowerCase().endsWith('.svg'));
      if (isSvg) {
        const reader = new FileReader();
        reader.onload = (loadEvent) => {
          sourcePreviewUrl = loadEvent.target.result;
          originalImage.src = sourcePreviewUrl;
          originalImage.style.display = 'block';
          origPlaceholderText.style.display = 'none';
          setStatus('Ready to execute.', '');
        };
        reader.readAsDataURL(file);
      } else {
        sourcePreviewUrl = '';
        originalImage.removeAttribute('src');
        originalImage.style.display = 'none';
        origPlaceholderText.style.display = 'flex';
        origPlaceholderText.textContent = file ? 'Invalid format' : 'Awaiting Source File (.svg)';
      }
    });

    questionInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        const hasText = questionInput.value.trim() !== '';
        const hasAnnotations = annotations.length > 0;
        if (!btn.disabled && (hasText || hasAnnotations)) {
          form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
        }
      }
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const rawQuestion = questionInput.value.trim();
      const userQuestion = rawQuestion || lastSubmittedQuery;
      const hadAnnotations = annotations.length > 0;

      if (!userQuestion && !hadAnnotations) return;
      if (rawQuestion) lastSubmittedQuery = rawQuestion;

      btn.disabled = true;

      const displayQuestion = rawQuestion ? userQuestion : '(Visual Instruction Provided via Canvas)';
      const timeStr = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const userMessage = `
        <div class="chat-message" style="align-self: flex-end;">
          <div class="chat-time" style="justify-content: flex-end;">User Query - ${timeStr}</div>
          <div class="chat-bubble" style="background:#f0f4ff; border-left:none; border-right: 3px solid var(--primary); border-radius: 6px 0 6px 6px;">
            <p>${escapeHtml(displayQuestion)}</p>
          </div>
        </div>
      `;

      if (qaAnswer.querySelector('.empty-state')) {
        qaAnswer.innerHTML = '';
      }
      qaAnswer.innerHTML += userMessage;
      qaAnswer.scrollTop = qaAnswer.scrollHeight;

      renderWorkflowPending({ userQ: userQuestion, displayQ: displayQuestion, hadAnnotations });
      setStatus('Processing instruction...', 'active');

      if (!window.currentResultUrl) {
        resultPlaceholderText.style.display = 'flex';
        resultPlaceholderText.textContent = 'Executing transformation...';
      } else {
        resultImage.style.opacity = '0.5';
      }

      try {
        const formData = new FormData(form);
        formData.set('question', userQuestion);
        const enhancedBlob = await renderEnhancedBlob();
        if (enhancedBlob) {
          formData.set('enhanced_image', enhancedBlob, 'enhanced.png');
        }

        questionInput.value = '';
        const response = await fetch('/api/run/stream', {
          method: 'POST',
          body: formData,
          headers: { Accept: 'text/event-stream' },
        });
        if (!response.ok) {
          const data = await response.json();
          throw new Error(_text(data && data.error) || `HTTP ${response.status}`);
        }
        const data = await consumeWorkflowStream(response, { userQ: userQuestion, displayQ: displayQuestion, hadAnnotations });

        renderWorkflow(data, { userQ: userQuestion, displayQ: displayQuestion, hadAnnotations });
        qaAnswer.innerHTML += renderAllAnswersAsChat(data);
        qaAnswer.scrollTop = qaAnswer.scrollHeight;

        if (data.output_image_url) {
          window.currentResultUrl = data.output_image_url;
          document.getElementById('imageToolbar').style.display = 'flex';
          resultImage.style.display = 'block';
          resultImage.onload = () => {
            syncAnnotationCanvasToResult();
          };
          resultImage.src = `${data.output_image_url}${data.output_image_url.includes('?') ? '&' : '?'}t=${Date.now()}`;
          resultImage.style.opacity = '1';
          resultPlaceholderText.style.display = 'none';
        }

        if (response.ok) {
          setStatus('Analysis complete', 'success');
        } else {
          setStatus('Execution Failure', 'error');
          if (data.error) {
            qaAnswer.innerHTML += `
              <div class="chat-message">
                <div class="chat-bubble" style="border-left-color:#e53e3e;">
                  <h4>Error</h4>
                  <p>${escapeHtml(data.error)}</p>
                </div>
              </div>
            `;
          }
        }
      } catch (err) {
        qaAnswer.innerHTML += `
          <div class="chat-message">
            <div class="chat-bubble" style="border-left-color:#e53e3e;">
              <h4>Network Error</h4>
              <p>${escapeHtml(String(err))}</p>
            </div>
          </div>
        `;
        renderWorkflowEmptyState(`网络异常，未拿到 workflow 结果：${String(err)}`);
        setStatus('Network exception occurred', 'error');
      } finally {
        btn.disabled = false;
        resultImage.style.opacity = '1';
        qaAnswer.scrollTop = qaAnswer.scrollHeight;
      }
    });

    document.getElementById('btnZoomIn').addEventListener('click', () => {
      currentZoom += 0.25;
      resultImage.style.transform = `scale(${currentZoom})`;
      annoCanvas.style.transform = `scale(${currentZoom})`;
    });

    loadModelCatalog();

    document.getElementById('btnZoomOut').addEventListener('click', () => {
      currentZoom = Math.max(0.25, currentZoom - 0.25);
      resultImage.style.transform = `scale(${currentZoom})`;
      annoCanvas.style.transform = `scale(${currentZoom})`;
    });

    document.getElementById('btnZoomReset').addEventListener('click', () => {
      currentZoom = 1;
      resultImage.style.transform = 'scale(1)';
      annoCanvas.style.transform = 'scale(1)';
      syncAnnotationCanvasToResult();
    });

    document.getElementById('btnFullscreen').addEventListener('click', () => {
      const card = document.getElementById('outputCard');
      if (!document.fullscreenElement) {
        card.requestFullscreen().catch((err) => {
          console.error(`Error attempting to enable fullscreen: ${err.message}`);
        });
      } else {
        document.exitFullscreen();
      }
    });

    document.getElementById('btnDownload').addEventListener('click', () => {
      if (!window.currentResultUrl) return;
      const link = document.createElement('a');
      link.href = window.currentResultUrl;
      link.download = 'modified_chart_output';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    });

    window.addEventListener('resize', syncAnnotationCanvasToResult);
    document.addEventListener('fullscreenchange', () => window.setTimeout(syncAnnotationCanvasToResult, 80));

    renderWorkflowEmptyState('这里会展示问题拆解、操作计划、执行步骤、render 校验和答案链路。');
  </script>

</body>

</html>
